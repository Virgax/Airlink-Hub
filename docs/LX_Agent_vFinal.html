<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LX Agent — Airlink Distribution</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0F2340;
    --blue: #1F4E79;
    --accent: #4A9FE0;
    --accent2: #00D4AA;
    --bg: #0A1628;
    --surface: #0F2340;
    --surface2: #162C4F;
    --border: #1E3A5F;
    --text: #E8F0FE;
    --text-dim: #7A9EC8;
    --red: #E57373;
    --green: #66BB6A;
    --yellow: #FFA726;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* CONFIG PANEL */


  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, #0A1F3D 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(74,159,224,0.05));
    pointer-events: none;
  }

  .header-info h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
  .header-info p { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-left: auto; box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* CHAT AREA */
  #chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
    max-height: calc(100vh - 260px);
    scroll-behavior: smooth;
  }

  /* MESSAGES */
  .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .msg.bot { align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    color: var(--bg); flex-shrink: 0;
  }
  .msg.user .msg-avatar { background: linear-gradient(135deg, #5C6BC0, #7986CB); }

  .msg-bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.bot .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
    color: var(--text);
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #1A3A6B, #1F4E79);
    border: 1px solid rgba(74,159,224,0.2);
    border-top-right-radius: 3px;
    color: var(--text);
  }

  .msg-bubble strong { color: var(--accent); }
  .msg-bubble .feedback-pass { color: var(--accent2); font-size: 13px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .msg-bubble .feedback-fail { color: var(--yellow); font-size: 13px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

  /* EMPLOYEE CARD */
  .emp-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .emp-card .emp-row { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .emp-card .emp-row:last-child { border-bottom: none; }
  .emp-card .emp-label { color: var(--text-dim); min-width: 110px; }
  .emp-card .emp-val { color: var(--accent); font-weight: 600; }

  /* CONFIRM BUTTONS */
  .confirm-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .confirm-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .confirm-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .confirm-btn.selected { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }

  /* TYPING INDICATOR */
  .typing { display: flex; gap: 4px; padding: 14px 16px; align-items: center; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

  /* INPUT AREA */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    bottom: 0;
  }
  #input-row {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-dim); }
  #send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: var(--bg);
    width: 48px; height: 48px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.9; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* PROGRESS BAR */
  #progress-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    margin: 0;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
  }

  /* ERROR */
  .error-msg { color: var(--red); font-size: 12px; font-family: var(--mono); margin-top: 6px; }

  /* DONE STATE */
  .done-banner {
    background: linear-gradient(135deg, rgba(0,212,170,0.1), rgba(74,159,224,0.1));
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 16px;
    margin-top: 10px;
    text-align: center;
  }
  .done-banner .done-icon { font-size: 32px; margin-bottom: 8px; }
  .done-banner p { font-size: 14px; line-height: 1.6; }

  /* SCROLLBAR */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

function setProgress(phase) {
  document.getElementById('progress-fill').style.width = (PROGRESS[phase] || 0) + '%';
}

function addBotMessage(html, extra = '') {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `
    <div class="msg-avatar">LX</div>
    <div class="msg-bubble">${formatMsg(html)}${extra}</div>
  `;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `
    <div class="msg-avatar">TÚ</div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.id = 'typing-indicator';
  el.innerHTML = `<div class="msg-avatar">LX</div><div class="msg-bubble typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function formatMsg(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function escHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setInputEnabled(enabled) {
  document.getElementById('user-input').disabled = !enabled;
  document.getElementById('send-btn').disabled = !enabled;
  if (enabled) document.getElementById('user-input').focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// API CALLS
// ============================================================
async function callFlow(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

async function callValidator(answer, criteria, questionText) {
  const data = await callFlow(URLS.validator, {
    answer: answer,
    retryCount: '0',
    gateCriteria: criteria,
    questionText: questionText,
    employeeCode: state.employeeCode
  });
  return data;
}

async function start() {
  setInputEnabled(false);
  addBotMessage(`¡Hola! Soy **LX**! 👋\n\nTu entrenador y fiel ayudante de reporte diario de **Airlink Distribution**.\n\nPara comenzar, ¿cuál es tu **código de empleado**?\nEjemplos: DR0002, DR0020, DR0668, DR1000\n\nRecuerda: "DR" seguido de 4 números.`);
  state.phase = 'init';
  setProgress('init');
  setInputEnabled(true);
}

async function handleEmployeeCode(code) {
  code = code.trim().toUpperCase();
  if (!URLS.init) {
    addBotMessage('⚠️ Configura la URL del flujo PA_LX_GetEmployeeInfo primero.');
    setInputEnabled(true);
    return;
  }
  showTyping();
  try {
    const data = await callFlow(URLS.init, { employeeCode: code });
    removeTyping();

    if (!data.employeestatusflag || data.employeestatusflag === '') {
      addBotMessage(`Lo siento, no encontré ningún empleado con el código **${code}**.\nPor favor verifica tu código e intenta de nuevo.`);
      setInputEnabled(true);
      return;
    }
    if (data.employeestatusflag.toLowerCase() === 'inactive') {
      addBotMessage(`El empleado con código **${code}** no está activo en el sistema.\nContacta a tu supervisor o a Recursos Humanos.`);
      setInputEnabled(true);
      return;
    }

    // Store data
    state.employeeCode = data.employeecode || code;
    state.employeeData = data;
    state.yesterdayStatus = (data.yesterdaystatusflag || 'FIRST_REPORT').toLowerCase();
    state.yesterdayPriority1 = data.yesterdaypriority1 || '';
    state.yesterdayPriority2 = data.yesterdaypriority2 || '';
    state.yesterdayPriority3 = data.yesterdaypriority3 || '';
    state.yesterdayPriorityID = data.yesterdaypriorityid || '';
    state.randomQ1_ES = data.randomq1_es || '';
    state.randomQ1_Category = data.randomq1_category || '';
    state.randomQ1_GateCriteria = data.randomq1_gatecriteria || 'C1,C3';
    state.randomQ2_ES = data.randomq2_es || '';
    state.randomQ2_Category = data.randomq2_category || '';
    state.randomQ2_GateCriteria = data.randomq2_gatecriteria || 'C1,C3';

    // Show employee card
    const card = `
      <div class="emp-card">
        <div class="emp-row"><span class="emp-label">Código</span><span class="emp-val">${data.employeecode}</span></div>
        <div class="emp-row"><span class="emp-label">Nombre</span><span class="emp-val">${data.employeename}</span></div>
        <div class="emp-row"><span class="emp-label">Posición</span><span class="emp-val">${data.positionname || '—'}</span></div>
        <div class="emp-row"><span class="emp-label">Departamento</span><span class="emp-val">${data.departmentname || '—'}</span></div>
        <div class="emp-row"><span class="emp-label">Supervisor</span><span class="emp-val">${data.supervisorname}</span></div>
        <div class="emp-row"><span class="emp-label">Correo</span><span class="emp-val">${data.employeeemail}</span></div>
      </div>
      <div class="confirm-btns">
        <button class="confirm-btn" onclick="confirmEmployee(true)">✅ Sí, continuemos</button>
        <button class="confirm-btn" onclick="confirmEmployee(false)">🔄 Ingresar otro código</button>
      </div>
    `;
    addBotMessage(`¡Hola, **${data.employeename}**! 👋\nEsta es tu información de empleado:`, card);
    state.phase = 'employee_confirm';
    setProgress('employee_confirm');
    setInputEnabled(false);

  } catch(e) {
    removeTyping();
    addBotMessage(`⚠️ Error conectando al sistema: ${e.message}\nVerifica que la URL del flujo esté configurada correctamente.`);
    setInputEnabled(true);
  }
}

function confirmEmployee(yes) {
  document.querySelectorAll('.confirm-btn').forEach(b => b.disabled = true);
  if (!yes) {
    addUserMessage('No, quiero ingresar mi código de nuevo.');
    addBotMessage('¿Cuál es tu código de empleado?');
    state.phase = 'init';
    setInputEnabled(true);
    return;
  }
  addUserMessage('Sí, continuemos.');
  addBotMessage(`Perfecto. Seguimos, vamos a completar tu reporte diario. **${state.employeeData.employeename}**`);
  proceedAfterConfirm();
}

function proceedAfterConfirm() {
  // Start with QR questions or go to yesterday check
  if (state.randomQ1_ES && state.randomQ1_ES !== '') {
    askQR1();
  } else {
    state.answers.QR1 = 'N/A';
    state.answers.QR2 = 'N/A';
    checkYesterdayAndAsk();
  }
}

async function askQR1() {
  state.phase = 'qr1';
  setProgress('qr1');
  addBotMessage(`📋 **Pregunta especial — ${state.randomQ1_Category}**\n\n${state.randomQ1_ES}`);
  setInputEnabled(true);
}

async function handleQR1(answer) {
  if (!URLS.validator) { state.answers.QR1 = answer; askQR2(); return; }
  showTyping();
  try {
    const result = await callValidator(answer, state.randomQ1_GateCriteria, state.randomQ1_ES);
    removeTyping();
    const isValid = result.isvalid === true || String(result.isvalid).toLowerCase() === 'true';
    if (!isValid) {
      addBotMessage(`${result.feedback || 'Por favor elabora tu respuesta.'}`);
      setInputEnabled(true);
    } else {
      state.answers.QR1 = answer;
      if (result.feedback) addBotMessage(`<span class="feedback-pass">${result.feedback}</span>`);
      askQR2();
    }
  } catch(e) { removeTyping(); state.answers.QR1 = answer; askQR2(); }
}

async function askQR2() {
  if (!state.randomQ2_ES || state.randomQ2_ES === '') {
    state.answers.QR2 = 'N/A';
    checkYesterdayAndAsk();
    return;

  state.phase = 'qr2';
  setProgress('qr2');

    }
  } catch(e) { removeTyping(); state.answers.QR2 = answer; checkYesterdayAndAsk(); }
}

function checkYesterdayAndAsk() {
  const ys = state.yesterdayStatus;
  if (ys === 'first_report') {
    addBotMessage(`Parece que este es tu **primer reporte** en el sistema.\nNo hay prioridades anteriores que revisar. ¡Empezamos desde cero!`);
    state.answers.Q1 = 'Sin prioridades anteriores - Primer reporte en el sistema.';
    state.flags.NoPrevPriorities = true;
    askQ2();
  } else if (ys === 'no_priorities') {
    addBotMessage(`No registraste prioridades para hoy en tu reporte de ayer (**${state.employeeData.yesterdayreportdate || ''}**).\nEsto será anotado en tu reporte. ¡Continuamos!`);
    state.answers.Q1 = 'Sin prioridades registradas del día anterior.';
    state.flags.NoPrevPriorities = true;
    askQ2();
  } else {
    // has_priorities
    state.flags.NoPrevPriorities = false;
    askQ1();
  }
}

function askQ1() {
  state.phase = 'q1';
  setProgress('q1');
  addBotMessage(`Antes de empezar, revisemos tus compromisos de ayer (**${state.employeeData.yesterdayreportdate || ''}**):\n\n📋 **Prioridades de ayer:**\n1️⃣ ${state.yesterdayPriority1}\n2️⃣ ${state.yesterdayPriority2}\n3️⃣ ${state.yesterdayPriority3}\n\n¿Cuáles completaste? ¿Alguna quedó pendiente? Explícame el estatus de cada una.`);
  setInputEnabled(true);
}

async function handleQ1(answer) {
  if (!URLS.validator) { finishQ1(answer); return; }
  const qText = `De tus prioridades de ayer, cuáles completaste? 1.${state.yesterdayPriority1},2.${state.yesterdayPriority2},3.${state.yesterdayPriority3}`;
  showTyping();
  try {
    const result = await callValidator(answer, 'C1,C3', qText);
    removeTyping();
    const isValid = result.isvalid === true || String(result.isvalid).toLowerCase() === 'true';
    if (!isValid) {
      addBotMessage(`${result.feedback || 'Por favor elabora tu respuesta.'}`);
      setInputEnabled(true);
    } else {
      if (result.feedback) addBotMessage(`<span class="feedback-pass">${result.feedback}</span>`);
      finishQ1(answer);
    }
  } catch(e) { removeTyping(); finishQ1(answer); }
}

async function finishQ1(answer) {
  state.answers.Q1 = answer;
  // Mark priorities
  if (URLS.mark && state.yesterdayPriorityID) {
    try {
      await callFlow(URLS.mark, { employeeCode: state.employeeCode, priorityID: String(state.yesterdayPriorityID) });
    } catch(e) { /* non-blocking */ }
  }
  askQ2();
}

function checkHonesty(answer) {

  if (['todo bien','sin problemas','nada','no hubo problemas'].includes(low)) {
    state.flags.HonestyLow = true;
  }

  setInputEnabled(true);
}

async function handleQ7(answer) {
  const low = answer.toLowerCase().trim();
  const noPrio = ['no','ninguna','no tengo','no hay'].includes(low);

  if (noPrio) {
    addBotMessage(`Anotado. Hoy no registrarás prioridades para mañana.\nEsto será resaltado en tu reporte. ¡Sin problema!`);
    state.flags.NoTomPriorities = true;
    state.hasPriorities = '0';
  } else {
    state.tomPriority1 = answer;
    state.hasPriorities = '1';
    state.flags.NoTomPriorities = false;
  }

  state.answers.Q7_Raw = answer;

  // Save priorities
  if (URLS.save) {
    try {
      await callFlow(URLS.save, {
        employeeCode: state.employeeCode,
        reportDate: state.employeeData.reportdate || '',
        priority1: state.tomPriority1,
        priority2: state.tomPriority2,
        priority3: state.tomPriority3,
        level: state.employeeData.reportlevel || '1',
        hasPriorities: state.hasPriorities
      });
    } catch(e) { /* non-blocking */ }
  }

  closeReport();
}

      answerQR2: state.answers.QR2, questionQR2: state.randomQ2_ES||'N/A',
      categoryQR2: state.randomQ2_Category||'N/A',
      tomPriority1: state.tomPriority1, tomPriority2: state.tomPriority2,
      tomPriority3: state.tomPriority3,
      yesterdayPriority1: state.yesterdayPriority1,
      yesterdayPriority2: state.yesterdayPriority2,
      yesterdayPriority3: state.yesterdayPriority3,
      flagNoPrev: String(state.flags.NoPrevPriorities),
      flagNoTom: String(state.flags.NoTomPriorities),
      flagHonesty: String(state.flags.HonestyLow),
      flagMaxRetryQ2: String(state.flags.MaxRetryQ2),
      flagMaxRetryQ3: String(state.flags.MaxRetryQ3),
      flagMaxRetryQ4: String(state.flags.MaxRetryQ4),
      flagMaxRetryQR1: String(state.flags.MaxRetryQR1),
      flagMaxRetryQR2: String(state.flags.MaxRetryQR2)
    });
    removeTyping();
    state.phase = 'done';
    setProgress('done');

    const msg = data.confirmationmessage || '✅ Reporte enviado exitosamente.';
    addBotMessage(msg);

  } catch(e) {
    removeTyping();
    addBotMessage(`⚠️ Error al enviar el reporte: ${e.message}`);
    state.phase = 'done';
    setProgress('done');
  }
}

// ============================================================
// MAIN SEND HANDLER
// ============================================================
function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  setInputEnabled(false);
  addUserMessage(text);

  switch(state.phase) {
    case 'init':           handleEmployeeCode(text); break;
    case 'qr1':            handleQR1(text); break;
    case 'qr2':            handleQR2(text); break;
    case 'q1':             handleQ1(text); break;
    case 'q2':             handleQ2(text); break;
    case 'q3':             handleQ3(text); break;
    case 'q4':             handleQ4(text); break;
    case 'q5':             handleQ5(text); break;
    case 'q7':             handleQ7(text); break;
    default: setInputEnabled(true);
  }
}

// ============================================================
// BOOT
// ============================================================
window.addEventListener('load', () => {
  start();
});
</script>

<script>
// PWA Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('powerautomate') || e.request.url.includes('anthropic')) {
        e.respondWith(fetch(e.request));
      }
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: '/'}).catch(() => {});
}
</script>
